<!DOCTYPE html>
<html lang="la">
<head>
<meta charset="UTF-8">
<title>HERMES</title>
<style>

@font-face {
    font-family: 'Cinzel';
    src: local('Cinzel');
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background-image: url('bg.png');
    background-size: cover;
    background-position: center;
    overflow-y: auto;
    overflow-x: hidden;
    font-family: 'Courier New', monospace;
}

.hermes-face {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: pre;
    font-family: 'Courier New', monospace;
    font-size: clamp(5px, 1.05vw, 13px);
    line-height: 1;
    color: #8a1f1f;
    text-shadow: 0 0 18px rgba(138,31,31,0.55);
    opacity: 0.5;
    user-select: none;
    animation: facePulse 2.6s ease-in-out infinite;
}

@keyframes facePulse {
    0%, 100% { opacity: 0.32; transform: scale(1); color: #8a1f1f; }
    35% { opacity: 0.55; transform: scale(1.015); color: #9c8a5e; }
    60% { opacity: 0.4; transform: scale(0.99); color: #6b1a1a; }
    80% { opacity: 0.6; transform: scale(1.02); color: #3d5c4f; }
}

.veil {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, rgba(6,6,8,0.15) 0%, rgba(6,6,8,0.6) 60%, rgba(6,6,8,0.96) 100%);
    pointer-events: none;
}

.scanlines {
    position: fixed;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.018) 0px,
        rgba(255,255,255,0.018) 1px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0) 3px
    );
    mix-blend-mode: overlay;
}

.vignette-flicker {
    position: fixed;
    inset: 0;
    z-index: 7;
    pointer-events: none;
    background: rgba(255,255,255,0.012);
    animation: flicker 6.3s infinite steps(1);
}

@keyframes flicker {
    0%, 91%, 100% { opacity: 0; }
    92% { opacity: 1; }
    93% { opacity: 0; }
    94% { opacity: 0.6; }
    95% { opacity: 0; }
}

main {
    position: relative;
    z-index: 5;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 4vh 4vw 2vh 4vw;
}

.crest-label {
    font-family: 'Cinzel', 'Times New Roman', serif;
    letter-spacing: 0.6em;
    font-size: 0.72rem;
    color: #8a7350;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 1.4vh;
}

h1.wordmark {
    font-family: 'Cinzel', 'Times New Roman', serif;
    font-size: clamp(2.4rem, 6vw, 5.2rem);
    letter-spacing: 0.35em;
    color: #d9d2bd;
    text-shadow:
        0 0 6px rgba(217,210,189,0.35),
        0 0 22px rgba(139,26,26,0.25);
    position: relative;
    animation: breathe 5s ease-in-out infinite;
}

h1.wordmark::before,
h1.wordmark::after {
    content: 'HERMES';
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    overflow: hidden;
    clip-path: inset(0 0 0 0);
}

h1.wordmark::before {
    color: #6b1a1a;
    animation: glitchA 7.4s infinite linear;
    opacity: 0.5;
}

h1.wordmark::after {
    color: #3d5c4f;
    animation: glitchB 9.1s infinite linear;
    opacity: 0.4;
}

@keyframes breathe {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.12); }
}

@keyframes glitchA {
    0%, 94%, 100% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
    55% { clip-path: inset(10% 0 60% 0); transform: translate(-3px, 1px); }
    56% { clip-path: inset(70% 0 5% 0); transform: translate(2px, -1px); }
    57% { clip-path: inset(30% 0 40% 0); transform: translate(-2px, 0); }
    58% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
}

@keyframes glitchB {
    0%, 92%, 100% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
    93% { clip-path: inset(50% 0 10% 0); transform: translate(3px, 0); }
    94% { clip-path: inset(5% 0 80% 0); transform: translate(-2px, 1px); }
    95% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
}

.subtitle {
    font-family: 'Cinzel', serif;
    font-style: italic;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    color: #7d735c;
    margin-top: 1.6vh;
    text-align: center;
    max-width: 600px;
    min-height: 2.8em;
}

.divider {
    width: min(70vw, 640px);
    height: 1px;
    margin: 2.6vh 0 2vh 0;
    background: linear-gradient(to right, transparent, #4a4032, transparent);
}

/* --- Optimized High-Visibility Middle Text --- */
.codex {
    max-width: 680px;
    text-align: center;
    color: #c9c2af; /* Changed from dim #55503f to a brighter, highly readable ivory tone */
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    line-height: 2.0;
    background: rgba(14, 14, 18, 0.65); /* Keeps text distinct even against chaotic background art */
    padding: 20px 30px;
    border-radius: 6px;
    border: 1px solid rgba(141, 122, 91, 0.2);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.codex span {
    color: #b82b2b; /* Slightly enhanced red for emphasis contrast */
    text-shadow: 0 0 8px rgba(184, 43, 43, 0.4);
}

footer {
    position: relative;
    z-index: 5;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 3vh;
}

.threshold-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.4em;
    color: #635d4d; /* Brightened up slightly for better baseline visibility */
    margin-bottom: 0.8vh;
    text-transform: uppercase;
}

.threshold {
    width: min(90vw, 460px);
    background: transparent;
    border: none;
    border-bottom: 1px solid #4a4537;
    color: #b7ac86;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 0.6em 0;
    outline: none;
    caret-color: #8a1f1f;
    transition: border-color 0.6s ease;
}

.threshold:focus {
    border-color: #8a1f1f;
}

.threshold.wrong {
    animation: shudder 0.4s;
    border-color: #6b1a1a;
}

@keyframes shudder {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
}

.correct-flash {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d9d2bd;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.3em;
    font-size: 1.2rem;
    opacity: 0;
    pointer-events: none;
}

.correct-flash.active {
    opacity: 1;
    pointer-events: all;
    animation: dissolve 1.6s forwards;
}

@keyframes dissolve {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 1; }
}

/* ==========================================================================
   MOBILE OVERRIDES (Triggered by JS User Agent class injection)
   ========================================================================== */
body.mobile-device .hermes-face {
    font-size: 6px; /* Scales down the central background text art if visible */
    opacity: 0.25;  /* Lowers opacity to prevent competing with main content */
}

body.mobile-device main {
    padding: 6vh 6vw 3vh 6vw;
}

body.mobile-device h1.wordmark {
    font-size: 2.5rem; /* Prevents long wordmark clipping on small viewports */
    letter-spacing: 0.2em;
}

body.mobile-device .subtitle {
    font-size: 0.8rem;
    padding: 0 10px;
}

body.mobile-device .codex {
    font-size: 0.8rem;
    line-height: 1.7;
    padding: 15px 20px;
    width: 100%;
}

body.mobile-device .threshold {
    font-size: 0.95rem;
}

</style>
</head>
<body>

<div class="hermes-face" id="hermesFace"></div>
<div class="veil"></div>
<div class="scanlines"></div>
<div class="vignette-flicker"></div>

<main>

    <div class="crest-label">custodia nuntiorum</div>
    <h1 class="wordmark">HERMES</h1>
    <div class="subtitle" id="latinLine">&nbsp;</div>

    <div class="divider"></div>

    <div class="codex">
        Non omnis intrat qui appropinquat. <span>Verbum quaeritur, non clavis.</span><br>
        Qui viam novit non quaerit lucem. Silentium est primum signum.
    </div>

</main>

<footer>
    <div class="threshold-label">dic verbum</div>
    <input type="text" class="threshold" id="threshold" autocomplete="off" spellcheck="false">
</footer>

<div class="correct-flash" id="flash">TRANSITUS CONCESSUS</div>

<script>

/* ---------- User Agent Detection Engine ---------- */
function runUserAgentDetection() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isMobileRegex = /android|avantgo|blackberry|iemobile|ip(hone|od|ad)|juicy|maemo|midp|mmp|mobile|o2|opera m(ob|in)i|palm( os)?|phone|p(ixi|re)\/|plucker|pocket|psp|series(4|6)0|symbian|treo|up\.(browser|link)|vodafone|wap|windows ce|xda|xiino/i;
    
    if (isMobileRegex.test(ua)) {
        document.body.classList.add('mobile-device');
    }
}
runUserAgentDetection();

/* ---------- rotating latin lines, typewritten ---------- */
const lines = [
    'quod absconditum est manet absconditum donec verbum inveniatur',
    'nemo intrat sine nomine vero',
    'omnia nuntia per unam viam fluunt',
    'tempus non curat qui sine claritate loquitur',
    'sub umbra caducei nihil perit'
];

const latinEl = document.getElementById('latinLine');
let lineIdx = 0;

function typeLine(text, cb) {
    latinEl.textContent = '';
    let i = 0;
    const t = setInterval(() => {
        latinEl.textContent = text.slice(0, i);
        i++;
        if (i > text.length) {
            clearInterval(t);
            setTimeout(cb, 2200);
        }
    }, 38);
}

function eraseLine(cb) {
    let text = latinEl.textContent;
    const t = setInterval(() => {
        text = text.slice(0, -1);
        latinEl.textContent = text;
        if (text.length === 0) {
            clearInterval(t);
            cb();
        }
    }, 18);
}

function cycleLatin() {
    typeLine(lines[lineIdx], () => {
        eraseLine(() => {
            lineIdx = (lineIdx + 1) % lines.length;
            cycleLatin();
        });
    });
}
cycleLatin();

/* ---------- threshold phrase check ---------- */
const SECRET = "o captian my caption put down thee hee hee bomboclat";
const input = document.getElementById('threshold');
const flash = document.getElementById('flash');

input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const val = input.value.trim().toLowerCase();
        if (val === SECRET) {
            flash.classList.add('active');
            setTimeout(() => {
                window.location.href = '/send';
            }, 1500);
        } else {
            input.classList.add('wrong');
            setTimeout(() => input.classList.remove('wrong'), 400);
        }
    }
});

</script>

</body>
</html>
